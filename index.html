<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050712" />
    <title>灵秀岛 Lingxiu Island</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="webgl-field" aria-hidden="true"></canvas>
    <div class="cosmic-grade" aria-hidden="true"></div>

    <main class="app-shell" aria-label="灵秀岛 Lingxiu Island 对话引导式简历启动器">
      <section class="chat-panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">灵秀岛 Lingxiu Island</p>
            <h1>对话引导式简历启动器</h1>
          </div>
          <div class="header-meta">
            <p class="status-line">把普通经历整理成可写进简历的材料</p>
            <p class="stage-label" id="stageLabel">正在启动</p>
          </div>
        </header>

        <div class="stage-meter" aria-hidden="true">
          <span class="stage-dot is-active"></span>
          <span class="stage-dot"></span>
          <span class="stage-dot"></span>
          <span class="stage-dot"></span>
          <span class="stage-dot"></span>
        </div>

        <section class="messages" id="messages" aria-live="polite" aria-label="对话记录"></section>

        <footer class="composer-wrap">
          <div class="quick-replies" id="quickReplies" aria-label="快捷回复"></div>
          <p class="voice-status" id="voiceStatus" aria-live="polite"></p>
          <form class="composer" id="composer" autocomplete="off">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="用很口语的话说一句就行"
              aria-label="输入消息"
            ></textarea>
            <button class="mic-button" id="micButton" type="button" aria-label="开始语音输入" aria-pressed="false">
              <span class="mic-ring" aria-hidden="true"></span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15.5a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 0 0-7 0v6a3.5 3.5 0 0 0 3.5 3.5Z" />
                <path d="M18.5 11.5a6.5 6.5 0 0 1-13 0" />
                <path d="M12 18v3" />
                <path d="M8.5 21h7" />
              </svg>
            </button>
            <button class="send-button" id="sendButton" type="submit" aria-label="发送消息">
              <span>发送</span>
            </button>
          </form>
        </footer>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
